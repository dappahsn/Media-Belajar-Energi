<script id="fullscreen-script">
  document.getElementById("startBtn").addEventListener("click", function (e) {
  
    // Masuk Fullscreen
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen();
    }
  
    // Coba paksa Landscape (hanya HP yang support)
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock("landscape").catch(function (err) {
        console.log("Orientation lock tidak didukung:", err);
      });
    }
  
  });
  </script>

<body>

  <!-- HEADER -->
  <header class="header fixed-top text-center">

      <a href="index.html" class="logo-center">
        <img src="assets/img/Logo.png" alt="Logo">

    </div>

  <!-- HERO -->
  <section class="hero-custom">

    <!-- GIF Matahari & Awan -->
    <img src="assets/img/matahari.gif" class="sun-gif reveal delay-1" alt="Matahari">
    <img src="assets/img/awan.gif" class="cloud-gif reveal delay-2" alt="Awan">
